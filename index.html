<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyClass — Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF8F4;
  --white: #FFFFFF;
  --ink: #1C1C1E;
  --ink2: #48484A;
  --ink3: #8E8E93;
  --border: #E5E3DF;
  --shadow-sm: 0 1px 8px rgba(0,0,0,.06);
  --shadow-md: 0 4px 24px rgba(0,0,0,.09);
  --shadow-lg: 0 12px 48px rgba(0,0,0,.14);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --peach: #F2A96A;
  --yellow: #F2D46A;
  --pink: #F2A8C0;
  --sky: #A8CAF2;
  --mint: #A8E2C8;
  --lavender: #C4A8F2;
  --sidebar-w: 240px;
  --topbar-h: 60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden;}
input,textarea,select,button{font-family:'Outfit',sans-serif;}

/* ═══ AUTH SCREEN ═══ */
#auth-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .4s;}
#auth-screen.hidden{opacity:0;pointer-events:none;}
.auth-box{background:var(--white);border-radius:var(--radius-lg);padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;}
.auth-logo span{color:var(--peach);}
.auth-sub{font-size:13px;color:var(--ink3);margin-bottom:32px;}
.auth-tabs{display:flex;gap:4px;background:var(--cream);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;color:var(--ink3);border-radius:8px;cursor:pointer;transition:.2s;}
.auth-tab.active{background:var(--white);color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:7px;}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);outline:none;transition:.2s;background:var(--cream);}
.field input:focus{border-color:var(--ink2);background:var(--white);}
.btn-auth{width:100%;padding:14px;background:var(--ink);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:.2s;}
.btn-auth:hover{background:#333;}
.auth-msg{font-size:12px;color:#e55;margin-top:10px;text-align:center;min-height:18px;}

/* ═══ APP SHELL ═══ */
#app{display:none;}
#app.visible{display:flex;}
.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50;}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.sidebar-logo h1 span{color:var(--peach);}
.sidebar-logo p{font-size:11px;color:var(--ink3);margin-top:3px;}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);padding:8px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;margin-bottom:2px;font-size:14px;font-weight:500;color:var(--ink2);}
.nav-item:hover{background:var(--cream);}
.nav-item.active{background:var(--ink);color:var(--white);}
.nav-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0;}
.sidebar-user{padding:16px;border-top:1px solid var(--border);}
.user-row{display:flex;align-items:center;gap:10px;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--peach);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--white);flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-info .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-info .role{font-size:11px;color:var(--ink3);}
.btn-logout{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--ink3);transition:.2s;}
.btn-logout:hover{color:#e55;}
.btn-logout svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}

/* ═══ MAIN ═══ */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;}
.topbar{height:var(--topbar-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:16px;position:sticky;top:0;z-index:40;}
.topbar h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;flex:1;}
.topbar-actions{display:flex;gap:8px;}
.btn-primary{padding:9px 18px;background:var(--ink);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;white-space:nowrap;}
.btn-primary:hover{background:#333;}
.btn-primary svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;}
.btn-secondary{padding:9px 16px;background:transparent;color:var(--ink);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;}
.btn-secondary:hover{border-color:var(--ink2);}
.page-body{padding:32px;}

/* ═══ CLASSES PAGE ═══ */
.search-wrap{position:relative;max-width:320px;margin-bottom:28px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink3);fill:none;stroke-width:2;}
.search-wrap input{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;background:var(--white);transition:.2s;}
.search-wrap input:focus{border-color:var(--ink2);}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.folder-card{border-radius:var(--radius-md);cursor:pointer;position:relative;overflow:hidden;aspect-ratio:4/3;transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow-sm);}
.folder-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.folder-tab{position:absolute;top:0;right:24px;width:52px;height:16px;border-radius:8px 8px 0 0;}
.folder-body{position:absolute;inset:12px 0 0;border-radius:14px;border:2px solid rgba(0,0,0,.07);display:flex;flex-direction:column;justify-content:flex-end;padding:16px;}
.folder-label{background:rgba(255,255,255,.6);backdrop-filter:blur(6px);border:1.5px solid rgba(0,0,0,.07);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;display:inline-block;width:fit-content;}
.folder-meta{font-size:11px;color:rgba(0,0,0,.45);margin-top:5px;padding-left:2px;}
.folder-actions{position:absolute;top:20px;right:10px;display:flex;gap:4px;opacity:0;transition:.2s;}
.folder-card:hover .folder-actions{opacity:1;}
.icon-btn{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.75);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.icon-btn svg{width:13px;height:13px;stroke:var(--ink);fill:none;stroke-width:2;}
.empty-page{text-align:center;padding:80px 20px;color:var(--ink3);}
.empty-page .big-icon{font-size:56px;margin-bottom:16px;}
.empty-page p{font-size:14px;line-height:1.6;}

/* ═══ CLASS DETAIL ═══ */
#detail-view{display:none;}
.detail-hero{height:160px;position:relative;display:flex;align-items:flex-end;padding:24px 32px;}
.detail-hero .back{position:absolute;top:20px;left:24px;background:rgba(255,255,255,.7);backdrop-filter:blur(8px);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.detail-hero .back svg{width:18px;stroke:var(--ink);fill:none;stroke-width:2;}
.detail-hero h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;}
.detail-meta-bar{display:flex;gap:24px;padding:16px 32px;border-bottom:1px solid var(--border);background:var(--white);flex-wrap:wrap;}
.meta-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2);}
.meta-chip svg{width:15px;height:15px;stroke:var(--ink3);fill:none;stroke-width:1.8;}
.detail-tabs{display:flex;gap:0;padding:0 32px;background:var(--white);border-bottom:1px solid var(--border);}
.dtab{padding:14px 18px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2.5px solid transparent;transition:.2s;white-space:nowrap;}
.dtab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:600;}
.detail-body{padding:28px 32px;}

/* overview */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.ov-card{background:var(--white);border-radius:var(--radius-md);padding:20px;border:1px solid var(--border);}
.ov-card h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:10px;}
.ov-card textarea,.ov-card input{width:100%;border:none;outline:none;font-family:'Outfit',sans-serif;font-size:14px;line-height:1.7;color:var(--ink);resize:none;background:transparent;}
.ov-full{grid-column:1/-1;}

/* todo */
.todo-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border);transition:.15s;}
.todo-item:hover{box-shadow:var(--shadow-sm);}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.check-circle.done{background:var(--ink);border-color:var(--ink);}
.check-circle.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
.todo-text{flex:1;font-size:14px;}
.todo-text.done{text-decoration:line-through;color:var(--ink3);}
.todo-del{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--ink3);opacity:0;transition:.2s;}
.todo-item:hover .todo-del{opacity:1;}
.todo-del:hover{color:#e55;}
.todo-del svg{width:14px;stroke:currentColor;fill:none;stroke-width:2;}
.add-row{display:flex;gap:8px;margin-top:12px;}
.add-row input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;transition:.2s;}
.add-row input:focus{border-color:var(--ink2);}

/* files */
.file-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border);}
.file-icon-box{width:40px;height:40px;border-radius:10px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.file-info h4{font-size:14px;font-weight:500;}
.file-info p{font-size:11px;color:var(--ink3);margin-top:2px;}

/* ═══ CALENDAR ═══ */
.cal-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;}
.cal-box{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;}
.cal-nav-btns{display:flex;gap:6px;}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.cal-nav-btn:hover{border-color:var(--ink2);}
.cal-nav-btn svg{width:14px;stroke:var(--ink);fill:none;stroke-width:2;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.cal-dow span{text-align:center;font-size:11px;font-weight:600;color:var(--ink3);padding:6px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{min-height:80px;border-radius:var(--radius-sm);padding:6px;cursor:pointer;transition:.15s;border:1.5px solid transparent;}
.cal-cell:hover{background:var(--cream);}
.cal-cell.other-month .cday{color:#ccc;}
.cal-cell.today .cday{background:var(--ink);color:var(--white);border-radius:50%;}
.cal-cell.selected{border-color:var(--ink2);background:var(--cream);}
.cday{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;border-radius:50%;margin-bottom:4px;}
.cal-event-dots{display:flex;flex-wrap:wrap;gap:3px;}
.cal-dot{height:5px;border-radius:3px;flex-shrink:0;}
.cal-sidebar{display:flex;flex-direction:column;gap:16px;}
.cal-sidebar-box{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px;}
.cal-sidebar-box h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:14px;}
.cal-event-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid var(--border);cursor:pointer;transition:.15s;}
.cal-event-item:hover{box-shadow:var(--shadow-sm);}
.cal-color-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;}
.cal-event-info h4{font-size:13px;font-weight:600;}
.cal-event-info p{font-size:11px;color:var(--ink3);margin-top:2px;}
.cal-event-time{font-size:11px;font-weight:600;color:var(--ink3);margin-left:auto;white-space:nowrap;}

/* ═══ STUDENTS ═══ */
.students-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.chip{padding:7px 14px;border-radius:50px;border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.2s;background:var(--white);}
.chip.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
.students-table{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;}
.table-head{display:grid;grid-template-columns:1fr 160px 160px 80px;background:var(--cream);padding:12px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);border-bottom:1px solid var(--border);}
.student-row{display:grid;grid-template-columns:1fr 160px 160px 80px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:.15s;}
.student-row:last-child{border-bottom:none;}
.student-row:hover{background:var(--cream);}
.stu-name{display:flex;align-items:center;gap:10px;}
.stu-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--white);flex-shrink:0;}
.stu-name-text{font-size:14px;font-weight:500;}
.stu-memo{font-size:12px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.class-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;width:fit-content;}
.row-actions{display:flex;gap:4px;opacity:0;transition:.2s;}
.student-row:hover .row-actions{opacity:1;}

/* ═══ JOURNAL ═══ */
.journal-layout{display:grid;grid-template-columns:1fr 280px;gap:24px;}
.journal-list{display:flex;flex-direction:column;gap:14px;}
.journal-card{background:var(--white);border-radius:var(--radius-md);border:1px solid var(--border);padding:22px;cursor:pointer;transition:.2s;}
.journal-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.journal-card-top{display:flex;align-items:flex-start;gap:16px;}
.jdate{text-align:center;flex-shrink:0;min-width:44px;}
.jdate .jday{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;line-height:1;}
.jdate .jmon{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);}
.jdivider{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}
.jbody{flex:1;min-width:0;}
.jbody h4{font-size:15px;font-weight:600;margin-bottom:6px;}
.jbody p{font-size:13px;color:var(--ink2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.jtags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.jtag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.journal-sidebar-box{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px;}
.journal-sidebar-box h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:14px;}
.month-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.15s;font-size:13px;}
.month-item:hover{background:var(--cream);}
.month-item span:last-child{font-size:11px;color:var(--ink3);}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.modal-close{background:none;border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:.2s;}
.modal-close:hover{background:var(--cream);}
.modal-close svg{width:18px;stroke:currentColor;fill:none;stroke-width:2;}
.modal-body{padding:24px 28px 28px;}
.mfield{margin-bottom:18px;}
.mfield label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:8px;}
.mfield input,.mfield textarea,.mfield select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);outline:none;background:var(--cream);transition:.2s;}
.mfield input:focus,.mfield textarea:focus,.mfield select:focus{border-color:var(--ink2);background:var(--white);}
.mfield textarea{resize:none;min-height:100px;line-height:1.6;}
.color-row{display:flex;gap:10px;flex-wrap:wrap;}
.cdot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s;}
.cdot.sel{border-color:var(--ink);transform:scale(1.1);}
.modal-footer{display:flex;gap:10px;margin-top:22px;}
.modal-footer .btn-primary{flex:1;justify-content:center;}
.err-msg{font-size:12px;color:#e55;margin-top:8px;}

/* journal detail modal */
.jd-date{font-size:12px;color:var(--ink3);margin-bottom:6px;}
.jd-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:14px;line-height:1.2;}
.jd-content{font-size:14px;line-height:1.8;color:var(--ink2);}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--white);padding:12px 22px;border-radius:50px;font-size:13px;font-weight:500;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .cal-layout{grid-template-columns:1fr;}
  .journal-layout{grid-template-columns:1fr;}
  .table-head{grid-template-columns:1fr 140px 80px;}
  .student-row{grid-template-columns:1fr 140px 80px;}
  .table-head > *:nth-child(2),.student-row > *:nth-child(2){display:none;}
}
@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:.3s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .topbar{padding:0 16px;}
  .page-body{padding:20px 16px;}
  .overview-grid{grid-template-columns:1fr;}
  .detail-hero{padding:16px 20px;}
  .detail-meta-bar,.detail-tabs,.detail-body{padding-left:16px;padding-right:16px;}
  .mobile-menu-btn{display:flex!important;}
}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:4px;}

/* animate */

</style>

<script>
// ══════════ STORAGE HELPERS ══════════
const USERS_KEY = 'myclass_users';
const SESSION_KEY = 'myclass_session';

function getUsers(){ try{ return JSON.parse(localStorage.getItem(USERS_KEY))||{}; }catch(e){ return {}; } }
function saveUsers(u){ localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
function getSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch(e){ return null; } }
function setSession(u){ localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

function userDataKey(email){ return 'myclass_data_' + email.replace(/[^a-z0-9]/gi,'_'); }
function getUserData(email){
  try{ return JSON.parse(localStorage.getItem(userDataKey(email))) || {classes:[],students:[],journals:[]}; }
  catch(e){ return {classes:[],students:[],journals:[]}; }
}
function saveUserData(email, data){ localStorage.setItem(userDataKey(email), JSON.stringify(data)); }

// ══════════ STATE ══════════
let currentUser = null;
let data = { classes:[], students:[], journals:[] };
let currentPage = 'classes';
let currentClassId = null;
let currentDTab = 'overview';
let selectedColor = '#F2A96A';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = new Date();
let studentFilter = 'all';

// ══════════ AUTH ══════════
function switchAuthTab(tab){
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('signup-form').style.display = tab==='signup'?'block':'none';
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
}

function doSignup(){
  const name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim().toLowerCase();
  const pw = document.getElementById('su-pw').value;
  const msg = document.getElementById('signup-msg');
  if(!name||!email||!pw){ msg.textContent='모든 항목을 입력해주세요.'; return; }
  if(pw.length<6){ msg.textContent='비밀번호는 6자 이상이어야 해요.'; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ msg.textContent='올바른 이메일을 입력해주세요.'; return; }
  const users = getUsers();
  if(users[email]){ msg.textContent='이미 가입된 이메일이에요.'; return; }
  users[email] = { name, email, pw };
  saveUsers(users);
  msg.style.color='#2a2';
  msg.textContent='가입 완료! 로그인하세요.';
  setTimeout(()=>{ switchAuthTab('login'); document.getElementById('login-email').value=email; msg.style.color='#e55'; msg.textContent=''; },1000);
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pw = document.getElementById('login-pw').value;
  const msg = document.getElementById('login-msg');
  if(!email||!pw){ msg.textContent='이메일과 비밀번호를 입력해주세요.'; return; }
  const users = getUsers();
  if(!users[email]||users[email].pw!==pw){ msg.textContent='이메일 또는 비밀번호가 올바르지 않아요.'; return; }
  setSession({email, name: users[email].name});
  launchApp(users[email]);
}

function doLogout(){
  clearSession();
  currentUser = null;
  data = {classes:[],students:[],journals:[]};
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('login-email').value='';
  document.getElementById('login-pw').value='';
  document.getElementById('login-msg').textContent='';
}

function launchApp(user){
  currentUser = user;
  data = getUserData(user.email);
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('sidebar-greeting').textContent = user.name + ' 선생님';
  document.getElementById('user-name-sidebar').textContent = user.name;
  document.getElementById('user-avatar-sidebar').textContent = user.name.charAt(0);
  navigate('classes', document.getElementById('nav-classes'));
}

function persist(){ saveUserData(currentUser.email, data); }

// ══════════ NAV ══════════
function navigate(page, el){
  ['page-classes','detail-view','page-calendar','page-students','page-journal'].forEach(id=>{
    const el2 = document.getElementById(id);
    if(el2) el2.style.display='none';
  });
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  currentPage = page;
  closeSidebar();

  const titles = {classes:'Classes',calendar:'Calendar',students:'Students',journal:'Journal'};
  document.getElementById('topbar-title').textContent = titles[page]||page;

  if(page==='classes'){ document.getElementById('page-classes').style.display='block'; renderFolders(); setTopbarActions([{label:'+ 수업 추가',fn:'openClassModal()'}]); }
  if(page==='calendar'){ document.getElementById('page-calendar').style.display='block'; renderCalendar(); setTopbarActions([]); }
  if(page==='students'){ document.getElementById('page-students').style.display='block'; renderStudents(); setTopbarActions([{label:'+ 학생 추가',fn:'openStudentModal()'}]); }
  if(page==='journal'){ document.getElementById('page-journal').style.display='block'; renderJournal(); setTopbarActions([{label:'✏️ 일기 쓰기',fn:'openJournalModal()'}]); }
}

function setTopbarActions(actions){
  document.getElementById('topbar-actions').innerHTML = actions.map(a=>`<button class="btn-primary" onclick="${a.fn}">${a.label}</button>`).join('');
}

function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay-bg').classList.add('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay-bg').classList.remove('open'); }

// ══════════ CLASSES ══════════
function renderFolders(filter=''){
  const grid = document.getElementById('folder-grid');
  const list = data.classes.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase()));
  if(!list.length){
    grid.innerHTML = `<div class="empty-page" style="grid-column:1/-1"><div class="big-icon">📁</div><p>수업이 없어요.<br>+ 수업 추가 버튼으로 첫 수업을 만들어보세요!</p></div>`;
    return;
  }
  grid.innerHTML = list.map((c,i)=>`
    <div class="folder-card animate" style="animation-delay:${i*0.06}s" onclick="openDetail('${c.id}')">
      <div class="folder-tab" style="background:${c.color}"></div>
      <div class="folder-body" style="background:${c.color}55">
        <span class="folder-label">${c.name}</span>
        <div class="folder-meta">${c.schedule||'일정 미설정'}</div>
      </div>
      <div class="folder-actions">
        <button class="icon-btn" onclick="event.stopPropagation();openEditClassModalById('${c.id}')" title="편집">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function openDetail(id){
  currentClassId = id;
  const c = data.classes.find(x=>x.id===id);
  if(!c) return;
  ['page-classes','page-calendar','page-students','page-journal'].forEach(pid=>{ document.getElementById(pid).style.display='none'; });
  document.getElementById('detail-view').style.display='block';
  document.getElementById('topbar-title').textContent = c.name;
  setTopbarActions([]);
  const hero = document.getElementById('detail-hero');
  hero.style.background = `linear-gradient(135deg, ${c.color}80, ${c.color}30)`;
  document.getElementById('detail-title-text').textContent = c.name;
  document.getElementById('detail-meta-bar').innerHTML = `
    <div class="meta-chip"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${c.schedule||'일정 없음'}</div>
    <div class="meta-chip"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.room||'강의실 미설정'}</div>
    <div class="meta-chip"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${data.students.filter(s=>s.classId===id).length}명</div>
  `;
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.dtab')[0].classList.add('active');
  currentDTab = 'overview';
  renderDetailBody();
}

function closeDetail(){
  document.getElementById('detail-view').style.display='none';
  document.getElementById('page-classes').style.display='block';
  document.getElementById('topbar-title').textContent='Classes';
  setTopbarActions([{label:'+ 수업 추가',fn:'openClassModal()'}]);
  renderFolders();
}

function switchDTab(el,tab){
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentDTab = tab;
  renderDetailBody();
}

function renderDetailBody(){
  const c = data.classes.find(x=>x.id===currentClassId);
  const body = document.getElementById('detail-body');
  if(currentDTab==='overview'){
    body.innerHTML=`
      <div class="overview-grid">
        <div class="ov-card ov-full">
          <h4>수업 개요</h4>
          <textarea rows="3" onblur="saveField('overview',this.value)">${c.overview||''}</textarea>
        </div>
        <div class="ov-card ov-full">
          <h4>메모 / 노트</h4>
          <textarea rows="5" onblur="saveField('notes',this.value)">${c.notes||''}</textarea>
        </div>
      </div>`;
  } else if(currentDTab==='todo'){
    const todos = (c.todos||[]).map((t,i)=>`
      <div class="todo-item">
        <div class="check-circle ${t.done?'done':''}" onclick="toggleTodo(${i})"></div>
        <span class="todo-text ${t.done?'done':''}">${t.text}</span>
        <button class="todo-del" onclick="deleteTodo(${i})"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>`).join('');
    body.innerHTML = (todos||`<div class="empty-page" style="padding:40px"><div class="big-icon" style="font-size:36px">📋</div><p>할 일이 없어요</p></div>`) +
      `<button class="btn-primary" style="margin-top:12px" onclick="openModal('modal-todo')"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> 할 일 추가</button>`;
  } else if(currentDTab==='files'){
    const files = (c.files||[]).map(f=>`
      <div class="file-item">
        <div class="file-icon-box">${f.type}</div>
        <div class="file-info"><h4>${f.name}</h4><p>${f.size}</p></div>
      </div>`).join('');
    body.innerHTML = (files||`<div class="empty-page" style="padding:40px"><div class="big-icon" style="font-size:36px">📁</div><p>파일 없음</p></div>`) +
      `<button class="btn-secondary" style="margin-top:12px" onclick="alert('파일 기능은 준비 중이에요!')">+ 파일 추가</button>`;
  } else if(currentDTab==='related'){
    const jrnls = data.journals.filter(j=>j.classId===currentClassId);
    body.innerHTML = jrnls.length ? jrnls.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(j=>`
      <div class="journal-card animate" onclick="showJDetail('${j.id}')">
        <div class="journal-card-top">
          <div class="jdate"><div class="jday">${new Date(j.date).getDate()}</div><div class="jmon">${MONTHS_SHORT[new Date(j.date).getMonth()]}</div></div>
          <div class="jdivider"></div>
          <div class="jbody"><h4>${j.title}</h4><p>${j.content}</p></div>
        </div>
      </div>`).join('') :
      `<div class="empty-page" style="padding:40px"><div class="big-icon" style="font-size:36px">📔</div><p>이 수업의 일기가 없어요</p></div>`;
  }
}

function saveField(field, val){
  const c = data.classes.find(x=>x.id===currentClassId);
  if(c){ c[field]=val; persist(); }
}
function toggleTodo(i){
  const c = data.classes.find(x=>x.id===currentClassId);
  c.todos[i].done = !c.todos[i].done; persist(); renderDetailBody();
}
function deleteTodo(i){
  const c = data.classes.find(x=>x.id===currentClassId);
  c.todos.splice(i,1); persist(); renderDetailBody();
}
function saveTodo(){
  const t = document.getElementById('mt-text').value.trim();
  if(!t) return;
  const c = data.classes.find(x=>x.id===currentClassId);
  if(!c.todos) c.todos=[];
  c.todos.push({text:t,done:false}); persist();
  closeModal('modal-todo');
  document.getElementById('mt-text').value='';
  renderDetailBody(); toast('할 일이 추가됐어요 ✓');
}

// Class Modal
function openClassModal(){
  document.getElementById('modal-class-title').textContent='새 수업 추가';
  document.getElementById('edit-class-id').value='';
  document.getElementById('mc-name').value='';
  document.getElementById('mc-schedule').value='';
  document.getElementById('mc-room').value='';
  document.getElementById('mc-overview').value='';
  document.getElementById('mc-del-btn').style.display='none';
  selectedColor='#F2A96A';
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));
  document.querySelector('.cdot').classList.add('sel');
  openModal('modal-class');
}
function openEditClassModal(){ openEditClassModalById(currentClassId); }
function openEditClassModalById(id){
  const c = data.classes.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modal-class-title').textContent='수업 편집';
  document.getElementById('edit-class-id').value=id;
  document.getElementById('mc-name').value=c.name;
  document.getElementById('mc-schedule').value=c.schedule||'';
  document.getElementById('mc-room').value=c.room||'';
  document.getElementById('mc-overview').value=c.overview||'';
  document.getElementById('mc-del-btn').style.display='block';
  selectedColor=c.color;
  document.querySelectorAll('.cdot').forEach(d=>{ d.classList.toggle('sel', d.dataset.c===c.color); });
  openModal('modal-class');
}
function saveClass(){
  const name = document.getElementById('mc-name').value.trim();
  if(!name){ toast('수업 이름을 입력해주세요'); return; }
  const id = document.getElementById('edit-class-id').value;
  const obj = { name, schedule:document.getElementById('mc-schedule').value.trim(), room:document.getElementById('mc-room').value.trim(), overview:document.getElementById('mc-overview').value.trim(), color:selectedColor };
  if(id){
    const idx = data.classes.findIndex(c=>c.id===id);
    data.classes[idx] = {...data.classes[idx], ...obj};
  } else {
    data.classes.push({id:'c'+Date.now(), ...obj, todos:[], files:[], notes:''});
  }
  persist(); closeModal('modal-class'); renderFolders(); toast(id?'수업이 수정됐어요 ✓':'수업이 추가됐어요 ✓');
}
function deleteClass(){
  if(!confirm('이 수업을 삭제할까요? 관련 데이터도 삭제돼요.')) return;
  const id = document.getElementById('edit-class-id').value;
  data.classes = data.classes.filter(c=>c.id!==id);
  data.students = data.students.filter(s=>s.classId!==id);
  data.journals = data.journals.map(j=>j.classId===id?{...j,classId:null}:j);
  persist(); closeModal('modal-class');
  if(currentClassId===id){ closeDetail(); } else { renderFolders(); }
  toast('수업이 삭제됐어요');
}

// ══════════ CALENDAR ══════════
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW_MAP = { '월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':0,'MON':1,'TUE':2,'WED':3,'THU':4,'FRI':5,'SAT':6,'SUN':0 };

function getClassesForDate(d){
  const dow = d.getDay();
  return data.classes.filter(c=>{
    if(!c.schedule) return false;
    const part = c.schedule.split('|')[0];
    return part.split(/[,/]/).some(p=>DOW_MAP[p.trim()]===dow);
  });
}

function renderCalendar(){
  document.getElementById('cal-month-label').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const firstDow = new Date(calYear,calMonth,1).getDay();
  const lastDay = new Date(calYear,calMonth+1,0).getDate();
  const today = new Date();
  let html='';
  // previous month padding
  for(let i=0;i<firstDow;i++){
    const d = new Date(calYear,calMonth,1-firstDow+i);
    const cls2 = getClassesForDate(d);
    html+=`<div class="cal-cell other-month" onclick="selectCalDay(${d.getFullYear()},${d.getMonth()},${d.getDate()})">
      <div class="cday">${d.getDate()}</div>
      <div class="cal-event-dots">${cls2.map(c=>`<div class="cal-dot" style="background:${c.color};width:${Math.min(18,52/Math.max(cls2.length,1))}px"></div>`).join('')}</div>
    </div>`;
  }
  for(let d2=1;d2<=lastDay;d2++){
    const date = new Date(calYear,calMonth,d2);
    const isToday = today.toDateString()===date.toDateString();
    const isSel = selectedDate.toDateString()===date.toDateString();
    const cls2 = getClassesForDate(date);
    const hasJournal = data.journals.some(j=>new Date(j.date).toDateString()===date.toDateString());
    html+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectCalDay(${calYear},${calMonth},${d2})">
      <div class="cday">${d2}</div>
      <div class="cal-event-dots">
        ${cls2.map(c=>`<div class="cal-dot" style="background:${c.color};width:${Math.min(18,52/Math.max(cls2.length,1))}px"></div>`).join('')}
        ${hasJournal?`<div class="cal-dot" style="background:#C4A8F2;width:6px"></div>`:''}
      </div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  renderCalSidebar();
  renderCalClassList();
}
function selectCalDay(y,m,d){ selectedDate=new Date(y,m,d); calYear=y; calMonth=m; renderCalendar(); }
function changeMonth(dir){ calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }

function renderCalSidebar(){
  const isToday = selectedDate.toDateString()===new Date().toDateString();
  const label = isToday?'오늘':'선택된 날짜: '+`${selectedDate.getFullYear()}.${String(selectedDate.getMonth()+1).padStart(2,'0')}.${String(selectedDate.getDate()).padStart(2,'0')}`;
  document.getElementById('cal-sel-label').textContent = label;
  const cls2 = getClassesForDate(selectedDate);
  const jrnls = data.journals.filter(j=>new Date(j.date).toDateString()===selectedDate.toDateString());
  let html = cls2.map(c=>`
    <div class="cal-event-item" onclick="openDetail('${c.id}')">
      <div class="cal-color-bar" style="background:${c.color}"></div>
      <div class="cal-event-info"><h4>${c.name}</h4><p>${c.room||''}</p></div>
      <div class="cal-event-time">${(c.schedule||'').split('|')[1]?.trim()||''}</div>
    </div>`).join('');
  html += jrnls.map(j=>`
    <div class="cal-event-item" onclick="showJDetail('${j.id}')">
      <div class="cal-color-bar" style="background:#C4A8F2"></div>
      <div class="cal-event-info"><h4>📔 ${j.title}</h4><p>Journal</p></div>
    </div>`).join('');
  document.getElementById('cal-event-list').innerHTML = html||`<p style="font-size:13px;color:var(--ink3)">이 날은 일정이 없어요</p>`;
}
function renderCalClassList(){
  document.getElementById('cal-class-list').innerHTML = data.classes.map(c=>`
    <div class="cal-event-item" onclick="openDetail('${c.id}')">
      <div class="cal-color-bar" style="background:${c.color}"></div>
      <div class="cal-event-info"><h4>${c.name}</h4><p>${c.schedule||'—'}</p></div>
    </div>`).join('') || `<p style="font-size:13px;color:var(--ink3)">등록된 수업 없음</p>`;
}

// ══════════ STUDENTS ══════════
function renderStudents(){
  const chips = ['all',...data.classes.map(c=>c.id)];
  const chipLabels = {all:'전체'};
  data.classes.forEach(c=>chipLabels[c.id]=c.name);
  document.getElementById('filter-chips').innerHTML = chips.map(id=>`
    <div class="chip${studentFilter===id?' active':''}" onclick="setStudentFilter('${id}')">${chipLabels[id]}</div>`).join('');
  const list = studentFilter==='all' ? data.students : data.students.filter(s=>s.classId===studentFilter);
  const COLORS = ['#F2A96A','#F2D46A','#F2A8C0','#A8CAF2','#A8E2C8','#C4A8F2'];
  document.getElementById('students-list').innerHTML = list.map(s=>{
    const cls = data.classes.find(c=>c.id===s.classId);
    const color = s.color||COLORS[Math.abs(s.id.charCodeAt?s.id.charCodeAt(1)||0:0)%COLORS.length];
    return `<div class="student-row">
      <div class="stu-name">
        <div class="stu-avatar" style="background:${color}">${(s.name||'?').charAt(0)}</div>
        <span class="stu-name-text">${s.name}</span>
      </div>
      <div class="stu-memo">${s.memo||'—'}</div>
      <div>${cls?`<span class="class-badge" style="background:${cls.color}30;color:${cls.color}">${cls.name}</span>`:''}</div>
      <div class="row-actions">
        <button class="icon-btn" onclick="openEditStudentModal('${s.id}')" title="편집">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>`;
  }).join('') || `<div class="empty-page" style="padding:40px;grid-column:1/-1"><div class="big-icon" style="font-size:36px">👤</div><p>학생이 없어요</p></div>`;
}
function setStudentFilter(f){ studentFilter=f; renderStudents(); }

function openStudentModal(){
  document.getElementById('modal-student-title').textContent='학생 추가';
  document.getElementById('edit-student-id').value='';
  document.getElementById('ms-name').value='';
  document.getElementById('ms-memo').value='';
  document.getElementById('ms-del-btn').style.display='none';

  openModal('modal-student');
}
function openEditStudentModal(id){
  const s = data.students.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('modal-student-title').textContent='학생 편집';
  document.getElementById('edit-student-id').value=id;
  document.getElementById('ms-name').value=s.name;
  document.getElementById('ms-memo').value=s.memo||'';
  document.getElementById('ms-class').innerHTML = `<option value="">— 수업 선택 —</option>`+data.classes.map(c=>`<option value="${c.id}"${c.id===s.classId?' selected':''}>${c.name}</option>`).join('');
  document.getElementById('ms-del-btn').style.display='block';

}
function saveStudent(){
  const name = document.getElementById('ms-name').value.trim();
  if(!name){ toast('이름을 입력해주세요'); return; }
  const id = document.getElementById('edit-student-id').value;
  const COLORS = ['#F2A96A','#F2D46A','#F2A8C0','#A8CAF2','#A8E2C8','#C4A8F2'];
  const obj = { name, classId:document.getElementById('ms-class').value||null, memo:document.getElementById('ms-memo').value.trim() };
  if(id){ const idx=data.students.findIndex(s=>s.id===id); data.students[idx]={...data.students[idx],...obj}; }
  else { data.students.push({id:'s'+Date.now(),...obj,color:COLORS[data.students.length%COLORS.length]}); }
  persist(); closeModal('modal-student'); renderStudents(); toast(id?'학생 정보가 수정됐어요 ✓':'학생이 추가됐어요 ✓');
}
function deleteStudent(){
  if(!confirm('이 학생을 삭제할까요?')) return;
  const id = document.getElementById('edit-student-id').value;
  data.students = data.students.filter(s=>s.id!==id);
  persist(); closeModal('modal-student'); renderStudents(); toast('학생이 삭제됐어요');
}

// ══════════ JOURNAL ══════════
function renderJournal(){
  const sorted = [...data.journals].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('journal-list').innerHTML = sorted.length ? sorted.map(j=>{
    const cls = data.classes.find(c=>c.id===j.classId);
    const d = new Date(j.date);
    return `<div class="journal-card animate" onclick="showJDetail('${j.id}')">
      <div class="journal-card-top">
        <div class="jdate"><div class="jday">${d.getDate()}</div><div class="jmon">${MONTHS_SHORT[d.getMonth()]}</div></div>
        <div class="jdivider"></div>
        <div class="jbody">
          <h4>${j.title}</h4>
          <p>${j.content}</p>
          <div class="jtags">
            ${cls?`<span class="jtag" style="background:${cls.color}30">${cls.name}</span>`:''}
            <span class="jtag" style="background:var(--cream);color:var(--ink3)">${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('') : `<div class="empty-page"><div class="big-icon">📔</div><p>아직 일기가 없어요.<br>오늘 수업 이야기를 써보세요!</p></div>`;
  // month sidebar
  const monthMap = {};
  data.journals.forEach(j=>{ const k=new Date(j.date).toISOString().slice(0,7); monthMap[k]=(monthMap[k]||0)+1; });
  document.getElementById('journal-month-list').innerHTML = Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>`
    <div class="month-item"><span>${k}</span><span>${v}개</span></div>`).join('') || `<p style="font-size:13px;color:var(--ink3)">없음</p>`;
}
function openJournalModal(){
  document.getElementById('modal-journal-title').textContent='일기 쓰기';
  document.getElementById('edit-journal-id').value='';
  document.getElementById('mj-title').value='';
  document.getElementById('mj-content').value='';
  document.getElementById('mj-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('mj-del-btn').style.display='none';
  document.getElementById('mj-class').innerHTML=`<option value="">— 없음 —</option>`+data.classes.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  openModal('modal-journal');
}
function saveJournal(){
  const title = document.getElementById('mj-title').value.trim();
  const content = document.getElementById('mj-content').value.trim();
  if(!title||!content){ toast('제목과 내용을 입력해주세요'); return; }
  const id = document.getElementById('edit-journal-id').value;
  const obj = { title, content, date:document.getElementById('mj-date').value, classId:document.getElementById('mj-class').value||null };
  if(id){ const idx=data.journals.findIndex(j=>j.id===id); data.journals[idx]={...data.journals[idx],...obj}; }
  else { data.journals.push({id:'j'+Date.now(),...obj}); }
  persist(); closeModal('modal-journal'); renderJournal(); toast(id?'일기가 수정됐어요 ✓':'일기가 저장됐어요 ✓');
}
function deleteJournal(){
  if(!confirm('이 일기를 삭제할까요?')) return;
  const id = document.getElementById('edit-journal-id').value;
  data.journals = data.journals.filter(j=>j.id!==id);
  persist(); closeModal('modal-journal'); renderJournal(); toast('일기가 삭제됐어요');
}
function showJDetail(id){
  const j = data.journals.find(x=>x.id===id);
  if(!j) return;
  const cls = data.classes.find(c=>c.id===j.classId);
  const d = new Date(j.date);
  document.getElementById('jdetail-body').innerHTML=`
    <div class="jd-date">${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${cls?'· '+cls.name:''}</div>
    <div class="jd-title">${j.title}</div>
    <div class="jd-content">${j.content.replace(/\n/g,'<br>')}</div>
    <div style="margin-top:20px;display:flex;gap:8px">
      <button class="btn-secondary" style="font-size:13px" onclick="openEditJournalModal('${j.id}');closeModal('modal-jdetail')">✏️ 편집</button>
    </div>`;
  openModal('modal-jdetail');
}
function openEditJournalModal(id){
  const j = data.journals.find(x=>x.id===id);
  if(!j) return;
  document.getElementById('modal-journal-title').textContent='일기 편집';
  document.getElementById('edit-journal-id').value=id;
  document.getElementById('mj-title').value=j.title;
  document.getElementById('mj-content').value=j.content;
  document.getElementById('mj-date').value=j.date;
  document.getElementById('mj-del-btn').style.display='block';
  document.getElementById('mj-class').innerHTML=`<option value="">— 없음 —</option>`+data.classes.map(c=>`<option value="${c.id}"${c.id===j.classId?' selected':''}>${c.name}</option>`).join('');
  openModal('modal-journal');
}

// ══════════ MODAL UTILS ══════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e,id){ if(e.target.id===id) closeModal(id); }
function pickColor(el){
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
  selectedColor=el.dataset.c;
}

// ══════════ TOAST ══════════
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ══════════ INIT ══════════
const session = getSession();
if(session){ const users=getUsers(); if(users[session.email]){ launchApp(users[session.email]); } }
